name: Deploy to GitHub Pages

on:
  # Deploy on every push to the mainline branch.
  push:
    branches: [main]
  # Allow manually triggering a deploy from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment. Do NOT cancel in-progress runs: cancelling
# a Pages deployment mid-flight can wedge the deployment queue and time out
# every subsequent run (this bit us — see runs 14/15). Queue instead, matching
# GitHub's official Pages starter workflow.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build for a project page served under /common-architectures/.
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /common-architectures/

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, so a
      # deep link (e.g. /a/load-balancer refreshed directly) still boots the app.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # GitHub's Pages backend queue can be slow (we've seen 5+ min in
          # deployment_queued on healthy runs). Wait up to 20 min instead of
          # failing at the 10-min default.
          timeout: 1200000
